<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Feirão</title>

<style>
:root {
    --primary: #16a34a;
    --dark: #0f172a;
    --bg: #f8fafc;
    --card: #ffffff;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
}

/* TOPO CHECKOUT */
.topbar {
    background: var(--dark);
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 14px;
}

/* CONTAINER */
.container {
    padding: 20px;
    max-width: 480px;
    margin: auto;
}

/* CARD PRINCIPAL */
.checkout-box {
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* TITULO */
h1 {
    font-size: 22px;
    margin: 0 0 10px 0;
}

/* TIMER */
.timer {
    font-size: 28px;
    font-weight: bold;
    color: #dc2626;
    margin: 10px 0;
}

/* ALERTA */
.alert {
    background: #fef2f2;
    color: #b91c1c;
    padding: 10px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 10px;
}

/* ONLINE */
.online {
    font-size: 13px;
    margin-bottom: 15px;
}

/* BENEFICIOS */
.benefits {
    font-size: 14px;
    margin-bottom: 20px;
}

.benefits div {
    margin-bottom: 8px;
}

/* BOTÃO */
.cta {
    display: block;
    width: 100%;
    padding: 18px;
    border-radius: 14px;
    background: var(--primary);
    color: white;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
}

/* RODAPÉ */
.secure {
    text-align: center;
    font-size: 12px;
    color: #64748b;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="topbar">
🔒 Ambiente 100% Seguro
</div>

<div class="container">
    <div class="checkout-box">
        
        <h1>🔥 Mega Feirão Liberado</h1>
        
        <div class="timer" id="timer">03:00</div>

        <div class="alert">
        ⚠️ Oferta expira quando o tempo zerar
        </div>

        <div class="online" id="online">
        👥 132 pessoas estão finalizando agora
        </div>

        <div class="benefits">
            <div>✔ Desconto exclusivo hoje</div>
            <div>✔ Liberação imediata</div>
            <div>✔ Garantia total</div>
        </div>

        <a class="cta" href="https://thepeakyblinderzz-beep.github.io/3feirao/inicio/">
        🔥 FINALIZAR AGORA
        </a>

        <div class="secure">
        Pagamento seguro • Acesso imediato
        </div>

    </div>
</div>

<script>
// TIMER
let time = 180;
const timer = document.getElementById("timer");

setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;

    timer.innerText =
        (min < 10 ? "0" : "") + min + ":" +
        (sec < 10 ? "0" : "") + sec;

    if (time > 0) time--;
}, 1000);

// ONLINE
const online = document.getElementById("online");

setInterval(() => {
    let num = Math.floor(Math.random() * 40) + 120;
    online.innerText = "👥 " + num + " pessoas estão finalizando agora";
}, 3000);
</script>

</body>
</html>
